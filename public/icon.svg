<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Transparent background -->

  <!-- Kettlebell body -->
  <circle cx="256" cy="300" r="150" fill="#0F0F14"/>

  <!-- Kettlebell handle -->
  <path d="M156 220
           A100 100 0 0 1 356 220
           L326 220
           A70 70 0 0 0 186 220
           Z"
        fill="#0F0F14"/>

  <!-- Progress bars -->
  <rect x="205" y="250" width="30" height="70" rx="10" fill="url(#grad)"/>
  <rect x="245" y="220" width="30" height="100" rx="10" fill="url(#grad)"/>
  <rect x="285" y="190" width="30" height="130" rx="10" fill="url(#grad)"/>

  <!-- Check mark -->
  <path d="M205 320 L245 355 L315 275"
        stroke="url(#grad)"
        stroke-width="24"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="50%" stop-color="#FF5E8A"/>
      <stop offset="100%" stop-color="#A259FF"/>
    </linearGradient>
  </defs>
</svg>
